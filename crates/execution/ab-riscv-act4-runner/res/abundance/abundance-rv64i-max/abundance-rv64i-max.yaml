# yaml-language-server: $schema=../../../../external/riscv-unified-db/spec/schemas/config_schema.json
---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: abundance-rv64i-max
description: >
  Abundance RV64I-max core. RV64I + M, B (Zba/Zbb/Zbc/Zbs), Zknh, Zicsr, Zve64x (ELEN=64, VLEN=1024). Unaligned scalar
  and vector memory accesses are legal. No F/D. No A. No C. Machine mode only (Sm 1.13).

implemented_extensions:
  - { name: I,        version: "= 2.1" }
  - { name: M,        version: "= 2.0" }
  - { name: B,        version: "= 1.0.0" }
  - { name: Zba,      version: "= 1.0.0" }
  - { name: Zbb,      version: "= 1.0.0" }
  - { name: Zbc,      version: "= 1.0.0" }
  - { name: Zbkc,     version: "= 1.0.0" }
  - { name: Zbs,      version: "= 1.0.0" }
  - { name: Zknh,     version: "= 1.0.0" }
  - { name: Zicond,   version: "= 1.0.0" }
  - { name: Zicsr,    version: "= 2.0" }
  - { name: Zve32x,   version: "= 1.0.0" }
  - { name: Zve64x,   version: "= 1.0.0" }
  - { name: Zvl32b,   version: "= 1.0.0" }
  - { name: Zvl64b,   version: "= 1.0.0" }
  - { name: Zvl128b,  version: "= 1.0.0" }
  - { name: Zvl256b,  version: "= 1.0.0" }
  - { name: Zvl512b,  version: "= 1.0.0" }
  - { name: Zvl1024b, version: "= 1.0.0" }
  - { name: Sm,       version: "= 1.13.0" }

params:
  # --- Base ---
  MXLEN: 64
  PHYS_ADDR_WIDTH: 64
  # PMA_GRANULARITY is log2(bytes): 3 = 8-byte granularity (from qemu-rv64-max)
  PMA_GRANULARITY: 3
  MISA_CSR_IMPLEMENTED: false
  M_MODE_ENDIANNESS: little
  CONFIG_PTR_ADDRESS: 0

  # --- Vendor/arch/imp IDs ---
  MARCHID_IMPLEMENTED: false
  MIMPID_IMPLEMENTED: false
  VENDOR_ID_BANK: 0
  VENDOR_ID_OFFSET: 0

  # --- mtvec ---
  MTVEC_ACCESS: rw
  MTVEC_MODES: [ 0 ]
  MTVEC_BASE_ALIGNMENT_DIRECT: 4
  MTVEC_ILLEGAL_WRITE_BEHAVIOR: retain

  # --- mtval ---
  MTVAL_WIDTH: 64
  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: false
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: false
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: false
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: false
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: false

  # --- Trap behavior ---
  PRECISE_SYNCHRONOUS_EXCEPTIONS: true
  TRAP_ON_ECALL_FROM_M: true
  TRAP_ON_EBREAK: true
  TRAP_ON_ILLEGAL_WLRL: true
  TRAP_ON_UNIMPLEMENTED_CSR: true
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true
  TRAP_ON_RESERVED_INSTRUCTION: true

  # --- mcountinhibit ---
  # 32-element list: one boolean per counter (indices 0..31).
  # All false = no counters inhibited.
  COUNTINHIBIT_EN:
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false
    - false

  MSTATUS_VS_LEGAL_VALUES: [ 0, 1, 3 ]

  # --- Misaligned scalar memory ---
  MISALIGNED_LDST: true
  MISALIGNED_LDST_EXCEPTION_PRIORITY: low
  # Must be a power-of-2 >= 4
  MISALIGNED_MAX_ATOMICITY_GRANULE_SIZE: 4096
  MISALIGNED_SPLIT_STRATEGY: sequential_bytes

  # --- Extension mutability ---
  MUTABLE_MISA_M: false
  MUTABLE_MISA_B: false

  # --- Vector ---
  VLEN: 1024
  ELEN: 64
  FOLLOW_VTYPE_RESET_RECOMMENDATION: true
  HW_MSTATUS_VS_DIRTY_UPDATE: precise
  RVV_VL_WHEN_AVL_LT_DOUBLE_VLMAX: VLMAX
  SEW_MIN: 8
  SUPPORT_FRACTIONAL_LMUL_BEYOND_REQUIRED: "no_unrequired_supported"
  VILL_SET_ON_RESERVED_VTYPE: true
  RESERVED_VSET_X0X0_VILL_SET: "always"
  RESERVED_VSET_X0X0_VLMAX_CHANGE: "always"
  VECTOR_LS_INDEX_MAX_EEW: "XLEN"
  VECTOR_FF_UPDATE_PAST_TRIM: "update_none"
  VECTOR_FF_SEG_EXCEPTION_PARTIAL_LOAD: "no_subsegment_loaded"
  VECTOR_LS_MISALIGNED_LEGAL: true
  VECTOR_LOAD_PAST_TRAP: false
  VECTOR_LOAD_SEG_FF_OVERWRITE_ELEMENTS_AFTER_FAULT: "no_overwrite"
  VECTOR_LS_SEG_PARTIAL_ACCESS: false
  LEGAL_VSTART: "1_stride"
  VECTOR_LS_WHOLEREG_MISALIGNED_LEGAL: true
  VSSTATUS_VS_EXISTS: false
  VECTOR_FF_NO_EXCEPTION_TRIM: false
  IMPRECISE_VECTOR_TRAP_SETTABLE: false
  VFREDUSUM_NAN: "no_change"
  VFREDUSUM_NODE_ROUNDING_BEHAVIOR: "SEW_precision"
  VFREDUSUM_INACTIVE_NODE_ELEMENT_BEHAVIOR: "additive_identity"
  VFREDUSUM_FINAL_NODE_ELEMENT_BEHAVIOR: "additive_identity"
