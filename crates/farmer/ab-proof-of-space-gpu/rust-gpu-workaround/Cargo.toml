[workspace]

[package]
name = "ab-proof-of-space-gpu"
description = "Proof of space plotting utilities for GPU (Vulkan/Metal)"
license = "0BSD"
version = "0.1.0"
authors = ["Nazar Mokrynskyi <nazar@mokrynskyi.com>"]
edition = "2021"

[package.metadata.docs.rs]
all-features = true

[lib]
# SPIR-V target requires `dylib`
crate-type = ["dylib", "lib"]
path = "../src/lib.rs"

[dependencies]
ab-blake3 = { path = "../../../../crates/shared/ab-blake3" }
ab-chacha8 = { path = "../../../../crates/shared/ab-chacha8" }
spirv-std = { git = "https://github.com/Rust-GPU/rust-gpu", rev = "85e3c4296fa40f2841078b3961975c5484ab8498" }
